<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Wayground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tech-glow: #00f0ff;
            --geo-glow: #ffb703;
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #121212, #1e1e24); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .content { 
            position: relative; z-index: 10; width: 100%; max-width: 1200px; 
            padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; 
            perspective: 2000px; 
            flex: 1; 
        }
        
        .header-group {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeDown 1s ease-out;
        }

        h1 { 
            font-size: clamp(2rem, 5vw, 4rem); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.1em; 
            margin: 0 0 10px 0; color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2); 
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin: 0;
            font-weight: 400;
        }
        
        .cards { 
            display: flex; gap: 4rem; flex-wrap: wrap; justify-content: center; width: 100%; 
        }

        .card { 
            width: 400px; height: 500px; position: relative; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 24px; border: 2px solid rgba(255, 255, 255, 0.1); 
            padding: 3rem; display: flex; flex-direction: column; justify-content: flex-end;
            text-decoration: none; color: #fff; overflow: hidden; 
            transform-style: preserve-3d; transition: 0.4s ease; 
            cursor: pointer; animation: fadeUp 1s ease-out backwards; 
        }
        
        .card:nth-child(2) { animation-delay: 0.2s; }

        .card-inner { 
            transform: translateZ(50px); 
            display: flex; flex-direction: column; position: relative; z-index: 2;
        }
        
        /* Sử dụng ảnh Phú gửi làm nền */
        .meme-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0.3; transition: 0.6s ease; 
            z-index: 0;
            filter: grayscale(20%); 
        }

        /* Căn chỉnh để card Công Nghệ hiện Sư tử, card Địa Lý hiện Khỉ */
        .card-tech .meme-bg { object-position: 9% center; }
        .card-geo .meme-bg { object-position: 90% center; }

        .card:hover .meme-bg { opacity: 0.7; transform: scale(1.1) rotate(2deg); filter: grayscale(0%); }

        .card h2 { font-size: 2.5rem; margin: 0 0 0.5rem 0; font-weight: 700; }
        .card p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 2rem; font-weight: 400; }
        
        .cta-line { width: 0; height: 2px; background: #fff; transition: 0.4s ease; margin-bottom: 1rem; }
        .card:hover .cta-line { width: 100%; }
        
        .cta-text { 
            font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; 
            display: flex; align-items: center; gap: 8px; font-weight: 700;
        }
        .cta-text svg { width: 20px; transition: 0.3s ease; }
        .card:hover .cta-text svg { transform: translateX(10px); }

        .card-tech { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(0, 240, 255, 0.2); }
        .card-tech:hover { border-color: var(--tech-glow); box-shadow: 0 15px 40px rgba(0, 240, 255, 0.3); }
        .card-tech h2 { color: var(--tech-glow); text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .card-tech .cta-line { background: var(--tech-glow); }
        .card-tech .cta-text { color: var(--tech-glow); }

        .card-geo { box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(255, 183, 3, 0.2); }
        .card-geo:hover { border-color: var(--geo-glow); box-shadow: 0 15px 40px rgba(255, 183, 3, 0.3); }
        .card-geo h2 { color: var(--geo-glow); text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .card-geo .cta-line { background: var(--geo-glow); }
        .card-geo .cta-text { color: var(--geo-glow); }

        .footer {
            width: 100%;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
            background: rgba(0,0,0,0.2);
            margin-top: 20px;
        }

        @keyframes fadeDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 900px) { 
            .cards { gap: 2rem; }
            .card { width: 100%; max-width: 400px; height: 450px; padding: 2rem; } 
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="header-group">
            <h1>Quiz Wayground</h1>
            <p class="subtitle">pls learning kid 👍</p>
        </div>
        
        <div class="cards">
            
            <a href="https://wayground.com/join?gc=19934625" class="card card-tech" data-tilt>
                <img src="image_f1fefa.png" alt="Lion Meme" class="meme-bg">
                
                <div class="card-inner">
                    <h2>Công Nghệ</h2>
                    <p>👇click vào cái này này hay lắm</p>
                    <div class="cta-line"></div>
                    <div class="cta-text">
                        vào học
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                </div>
            </a>

            <a href="https://wayground.com/join?gc=56047905" class="card card-geo" data-tilt>
                <img src="image_f1fefa.png" alt="Monkey Meme" class="meme-bg">

                <div class="card-inner">
                    <h2>Địa Lý</h2>
                    <p>👇click vào cái này này hay lắm</p>
                    <div class="cta-line"></div>
                    <div class="cta-text">
                        vào học
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                </div>
            </a>

        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Bản quyền thuộc về Phú</p>
    </footer>

    <script>
        const cards = document.querySelectorAll('[data-tilt]');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -10;
                const rotateY = ((x - centerX) / centerX) * 10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
            });
        });
    </script>
</body>
</html>
