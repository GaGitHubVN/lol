<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Wayground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --phys-glow: #00f0ff;
            --chem-glow: #ffb703;
            --bio-glow: #00ff88;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        
        body, html { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 1;
        }
        
        .content { 
            position: relative; z-index: 10; width: 100%; max-width: 1300px; 
            padding: 4rem 2rem; display: flex; flex-direction: column; align-items: center; 
            flex: 1; 
        }
        
        .header-group { text-align: center; margin-bottom: 4rem; animation: fadeDown 1s ease-out; }
        h1 { 
            font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.2em; 
            margin: 0; background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 1.2rem; color: #888; margin-top: 10px; letter-spacing: 2px; }
        
        .cards-grid { 
            display: flex; flex-wrap: wrap; gap: 3rem; 
            justify-content: center; width: 100%;
        }

        .card { 
            width: 380px; height: 500px; position: relative; 
            background: var(--glass-bg); 
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: 55px; 
            border: 1px solid var(--glass-border); 
            padding: 3rem; display: flex; flex-direction: column; justify-content: flex-end;
            text-decoration: none; color: #fff; overflow: hidden; 
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 
            cursor: pointer; animation: fadeUp 1s ease-out backwards;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .glass-sheen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(255,255,255,0.15) 0%, transparent 50%);
            z-index: 3; pointer-events: none;
        }

        .meme-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0.2; transition: 0.8s ease; 
            z-index: 0; filter: grayscale(100%) brightness(0.6);
        }

        .card-phys .meme-bg { object-position: 50% center; }
        .card-chem .meme-bg { object-position: 90% center; }
        .card-bio .meme-bg { object-position: 11% center; }

        .card:hover { transform: translateY(-15px); border-color: rgba(255,255,255,0.3); }
        .card:hover .meme-bg { opacity: 0.5; filter: grayscale(0%) brightness(1); transform: scale(1.1); }

        .card-inner { position: relative; z-index: 4; pointer-events: none; }
        .card h2 { font-size: 2.8rem; margin: 0; font-weight: 700; letter-spacing: -1px; }
        .card p { font-size: 1rem; opacity: 0.6; margin: 10px 0 25px 0; }
        
        .cta-btn { 
            font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 700;
            background: rgba(255,255,255,0.1); width: fit-content;
            padding: 12px 25px; border-radius: 100px; transition: 0.4s;
        }
        .card:hover .cta-btn { background: #fff; color: #000; }

        .card-phys:hover { box-shadow: 0 40px 80px rgba(0, 240, 255, 0.15); }
        .card-phys h2 { color: var(--phys-glow); }
        
        .card-chem:hover { box-shadow: 0 40px 80px rgba(255, 183, 3, 0.15); }
        .card-chem h2 { color: var(--chem-glow); }

        .card-bio:hover { box-shadow: 0 40px 80px rgba(0, 255, 136, 0.15); }
        .card-bio h2 { color: var(--bio-glow); }

        .footer { padding: 3rem; font-size: 0.8rem; color: #444; letter-spacing: 3px; }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { .card { width: 100%; max-width: 400px; } }
    </style>
</head>
<body>

    <div class="content">
        <div class="header-group">
            <h1>Quiz Wayground</h1>
            <p class="subtitle">pls learning kid 👍</p>
        </div>
        
        <div class="cards-grid">
            <a href="https://wayground.com/join?gc=07592929" class="card card-phys" data-tilt>
                <div class="glass-sheen"></div>
                <img src="Einstein.jpg" alt="Phys" class="meme-bg">
                <div class="card-inner">
                    <h2>Vật Lí</h2>
                    <p>👇click vào cái này này hay lắm</p>
                    <div class="cta-btn">vào học</div>
                </div>
            </a>

            <a href="https://wayground.com/join?gc=18413025" class="card card-chem" data-tilt>
                <div class="glass-sheen"></div>
                <img src="licensed-image.jpg" alt="Chem" class="meme-bg">
                <div class="card-inner">
                    <h2>Hóa Học</h2>
                    <p>👇click vào cái này này hay lắm</p>
                    <div class="cta-btn">vào học</div>
                </div>
            </a>

            <a href="https://wayground.com/join?gc=04164833" class="card card-bio" data-tilt>
                <div class="glass-sheen"></div>
                <img src="images.png" alt="Bio" class="meme-bg">
                <div class="card-inner">
                    <h2>Sinh Học</h2>
                    <p>👇click vào cái này này hay lắm</p>
                    <div class="cta-btn">vào học</div>
                </div>
            </a>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Bản quyền thuộc về Phú</p>
    </footer>

    <script>
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -12;
                const rotateY = ((x - centerX) / centerX) * 12;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-15px) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0) scale3d(1, 1, 1)';
            });
        });
    </script>
</body>
</html>
